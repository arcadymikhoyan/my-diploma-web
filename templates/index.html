<!DOCTYPE html>
<html>
<head>
    <title>Главная - Мой Магазин</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; padding: 50px; }
        .hero { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #333; }
        .btn { display: inline-block; background: #007bff; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; margin-top: 20px; font-weight: bold; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Добро пожаловать в Digital Shop</h1>
        <p>Лучшая техника для вашего диплома и жизни</p>
        <a href="/catalog" class="btn">🛒 Перейти в каталог</a>
    </div>
</body>
</html>
